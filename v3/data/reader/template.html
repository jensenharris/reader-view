    :root {
      --fg: #000; /* foreground  */
      --bg: #fff; /* background  */
      --bd: #000; /* border  */
      --lk: #006fa5; /* link */
      --lkv: #d33bf0; /* link visited */
      --hg: #ffff81; /* highlight  */
    }
    html {
      overflow: overlay;
      scrollbar-color: var(--fg) var(--bg);
    }
    html[data-mode$="dark"] {
      --lk: #0096de;
    }
    body {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      margin: 30px auto 0 auto;
      padding: 10px;
      position: relative;

      color: var(--fg);
      border-color: var(--bd);
      background-color: var(--bg);
    }


    @media print {
      html[data-mode] {
        --fg: #000;
        --bd: #000;
        --bg: #fff;

        width: unset;
        padding: 0;
        margin: 0;
      }
    }
    iframe,
    img {
      max-width: 100%;
      height: auto;
    }
    img {
      margin-top: 4px;
      margin-bottom: 8px;
    }
    img:not([width])[src$=".svg"] {
      max-width: 100px;
    }
    body[data-images=false] canvas,
    body[data-images=false] svg,
    body[data-images=false] img {
      display: none;
    }
    svg:not([width]):not([height]) {
      max-width: 25vmin;
    }
    a {
      color: var(--lk);
      text-decoration: none;
    }
    a:visited {
      color: var(--lkv);
    }

    hr {
      background-color: var(--bd);
      height: 1px;
      border: 0;
    }
    #reader-domain {
      display: inline-flex;
      align-items: anchor-center;
      gap: 5px;
      font-family: Helvetica, Arial, sans-serif;
      text-decoration: none;
      border-bottom-color: currentcolor;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
      direction: ltr;
    }
    #reader-domain > span:nth-of-type(1) {
      font-size: 1.1em;
    }
    #reader-domain > span:nth-of-type(2) {
      font-size: 0.8em;
    }
    #reader-domain[data-mode="compact"] > span:nth-of-type(3) {
      display: none
    }
    #reader-domain:not([data-mode="compact"]) > span:nth-of-type(1),
    #reader-domain:not([data-mode="compact"]) > span:nth-of-type(2) {
      display: none;
    }

    #reader-title {
      font-size: 1.6em;
      line-height: 1.25em;
      width: 100%;
      margin: 20px 0;
      padding: 0;
    }
    #reader-credits,
    #doi,
    #published-time,
    #reader-estimated-time {
      font-size: 0.85em;
      line-height: 1.48em;
      margin: 0 0 10px 0;
      padding: 0;
    }
    #reader-credits:not(:empty)::after {
      content: ' ⋮ ';
    }
    #published-time:not(:empty)::before {
      content: ' ⋮ ';
    }
    #doi-json {
      overflow: hidden;
    }
    #doi-json code {
      overflow: auto;
      max-height: 400px;
    }
    #published-time:empty,
    #reader-credits:empty {
      display: none;
    }
    mark.hghlght {
      background-color: var(--hg);
    }
    body:not([data-columns="1"]) .page :is(h1, h2) {
      column-span: all;
      background-color: rgba(125, 125, 125, 0.1);
      padding: 10px;
    }
    .hidden {
      display: none;
    }
    .page-separator {
      background-color: rgba(125, 125, 125, 0.1);
      padding-block: 2ch;
      text-align: center;
      font-size: medium;
    }
    .page li {
      margin-block-end: 0.4em;
    }

<body tabindex="1" data-images=%data-images% data-font=%data-font% data-columns=%data-columns%>
  <span></span> <!-- for IntersectionObserver -->
  <a id="reader-domain" data-mode="compact">
    <span></span>
    <span></span>
    <span></span>
  </a>
  <h1 dir="auto" id="reader-title"></h1>
  <span dir="auto" id="reader-credits"></span>
  <span dir="auto" id="reader-estimated-time"></span>
  <span dir="auto" id="published-time"></span>
  <hr/>
  <div id="reader-content"></div>
  <span></span> <!-- for IntersectionObserver -->
  <script src="/defaults.js"></script>
  <script src="/data/config.js"></script>
  <script src="template.js"></script>

</body>
